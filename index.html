<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atividade - A autorização é necessária?</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #637082;
      --line: #d9e1ea;
      --paper: #ffffff;
      --soft: #f5f7fa;
      --blue: #1d6fd8;
      --blue-dark: #124f9c;
      --green: #1f8f5f;
      --red: #bf3d3d;
      --amber: #b46b12;
      --shadow: 0 18px 48px rgba(19, 34, 54, .14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(29, 111, 216, .10), transparent 38%),
        linear-gradient(315deg, rgba(31, 143, 95, .10), transparent 35%),
        #eef3f8;
    }

    button {
      font: inherit;
    }

    .activity {
      width: min(980px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px;
      display: flex;
      align-items: center;
    }

    .shell {
      width: 100%;
      background: var(--paper);
      border: 1px solid rgba(23, 32, 42, .08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--blue-dark);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro {
      margin: 12px 0 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .pill {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #354254;
      font-size: 14px;
      font-weight: 700;
    }

    .progress {
      flex: 1 1 220px;
      min-width: 180px;
      height: 12px;
      border-radius: 999px;
      background: #dfe7f0;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width .28s ease;
    }

    .stage {
      padding: 24px;
    }

    .question-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 20px;
      align-items: stretch;
    }

    .scenario {
      min-height: 260px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
    }

    .scenario-number {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .scenario-image {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0 0 18px;
      border-radius: var(--radius);
      object-fit: cover;
      background: #dfe7f0;
    }

    .scenario-text {
      margin: 0;
      font-size: clamp(21px, 3vw, 30px);
      line-height: 1.22;
      font-weight: 700;
    }

    .answers {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .answer {
      width: 100%;
      min-height: 64px;
      padding: 14px 16px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .answer:hover,
    .answer:focus-visible {
      border-color: var(--blue);
      box-shadow: 0 8px 20px rgba(29, 111, 216, .12);
      outline: none;
      transform: translateY(-1px);
    }

    .answer:disabled {
      cursor: default;
      transform: none;
      box-shadow: none;
      opacity: .72;
    }

    .answer.correct {
      border-color: var(--green);
      background: #edf8f2;
    }

    .answer.wrong {
      border-color: var(--red);
      background: #fff0f0;
    }

    .feedback {
      display: none;
      margin-top: 20px;
      padding: 18px 20px;
      border-left: 5px solid var(--blue);
      border-radius: var(--radius);
      background: #f6f9fd;
      line-height: 1.5;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .feedback.correct {
      border-left-color: var(--green);
    }

    .feedback.wrong {
      border-left-color: var(--amber);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }

    .primary,
    .secondary {
      min-height: 46px;
      padding: 11px 18px;
      border-radius: var(--radius);
      border: 2px solid transparent;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: #fff;
    }

    .primary:hover,
    .primary:focus-visible {
      background: var(--blue-dark);
      outline: none;
    }

    .secondary {
      background: #fff;
      color: var(--blue-dark);
      border-color: var(--line);
    }

    .secondary:hover,
    .secondary:focus-visible {
      border-color: var(--blue);
      outline: none;
    }

    .hidden {
      display: none !important;
    }

    .result {
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      text-align: center;
    }

    .result h2 {
      margin: 0 0 10px;
      font-size: clamp(25px, 4vw, 36px);
      line-height: 1.1;
    }

    .result p {
      margin: 0 auto 18px;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.5;
    }

    .score-big {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      margin: 12px 0 18px;
      color: var(--green);
      font-weight: 800;
    }

    .score-big .value {
      font-size: 54px;
      line-height: 1;
    }

    .review {
      display: grid;
      gap: 10px;
      margin: 20px 0;
      text-align: left;
    }

    .review-item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .review-item strong {
      display: block;
      margin-bottom: 5px;
    }

    .review-item span {
      color: var(--muted);
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .activity {
        padding: 12px;
        align-items: stretch;
      }

      .topbar,
      .stage {
        padding: 18px;
      }

      .question-panel {
        grid-template-columns: 1fr;
      }

      .scenario {
        min-height: 180px;
        padding: 20px;
      }

      .answer {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>
  <main class="activity">
    <section class="shell" aria-labelledby="activity-title">
      <header class="topbar">
        <p class="kicker">Atividade interativa</p>
        <h1 id="activity-title">A autorização é necessária?</h1>
        <p class="intro">Leia cada situação e indique se deve existir autorização de trabalho ou procedimento formal equivalente.</p>
        <div class="meta" aria-label="Progresso da atividade">
          <div class="pill" id="questionCounter">Situação 1 de 4</div>
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          <div class="pill" id="scoreLabel">0 certas</div>
        </div>
      </header>

      <div class="stage">
        <div id="quiz">
          <div class="question-panel">
            <article class="scenario">
              <p class="scenario-number" id="scenarioNumber">Situação 1</p>
              <img class="scenario-image" id="scenarioImage" src="" alt="">
              <p class="scenario-text" id="scenarioText"></p>
            </article>

            <div class="answers" id="answers" aria-label="Opções de resposta"></div>
          </div>

          <div class="feedback" id="feedback" role="status" aria-live="polite"></div>

          <div class="actions">
            <button class="secondary" type="button" id="restartButton">Recomeçar</button>
            <button class="primary hidden" type="button" id="nextButton">Seguinte</button>
          </div>
        </div>

        <div class="result hidden" id="result" aria-live="polite">
          <h2>Atividade concluída</h2>
          <p>Resultado final:</p>
          <div class="score-big"><span class="value" id="finalScore">0</span><span>/ 4</span></div>
          <p id="finalMessage"></p>
          <div class="review" id="review"></div>
          <button class="primary" type="button" id="playAgainButton">Jogar novamente</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        title: "Situação 1",
        image: "assets/situacao-1.png",
        imageAlt: "Trabalhador a entrar num reservatório com equipamento de segurança e supervisão.",
        scenario: "Entrada num reservatório para inspeção interior.",
        answer: "Sim",
        feedback: "A entrada em espaço confinado exige avaliação prévia, autorização, controlo atmosférico, comunicação, supervisão e meios de emergência."
      },
      {
        title: "Situação 2",
        image: "assets/situacao-2.png",
        imageAlt: "Trabalhador a realizar soldadura junto de materiais combustíveis.",
        scenario: "Soldadura numa zona onde existem materiais combustíveis próximos.",
        answer: "Sim",
        feedback: "Trabalhos a quente exigem controlo específico do risco de incêndio, limpeza da área, meios de combate a incêndio e, quando definido, vigia."
      },
      {
        title: "Situação 3",
        image: "assets/situacao-3.png",
        imageAlt: "Trabalhador a substituir uma lâmpada numa zona acessível.",
        scenario: "Substituição simples de uma lâmpada numa zona acessível, sem trabalho em altura, sem intervenção elétrica e de acordo com procedimento interno.",
        answer: "Pode não ser necessária autorização formal",
        feedback: "A necessidade de autorização depende do risco, do procedimento interno e das condições concretas da tarefa. Se houver trabalho em altura, acesso a instalação elétrica ou outra condição de risco, a tarefa deve ser reavaliada."
      },
      {
        title: "Situação 4",
        image: "assets/situacao-4.png",
        imageAlt: "Trabalhador a realizar manutenção num painel elétrico bloqueado e sinalizado.",
        scenario: "Manutenção em painel elétrico com necessidade de desenergização.",
        answer: "Sim",
        feedback: "Trabalhos elétricos exigem procedimento definido, bloqueio/etiquetagem ou consignação, verificação de ausência de tensão e comunicação clara aos intervenientes."
      }
    ];

    const options = [
      "Sim",
      "Pode não ser necessária autorização formal",
      "Não"
    ];

    let current = 0;
    let score = 0;
    let answered = false;
    const answersGiven = [];

    const questionCounter = document.getElementById("questionCounter");
    const progressBar = document.getElementById("progressBar");
    const scoreLabel = document.getElementById("scoreLabel");
    const scenarioNumber = document.getElementById("scenarioNumber");
    const scenarioImage = document.getElementById("scenarioImage");
    const scenarioText = document.getElementById("scenarioText");
    const answers = document.getElementById("answers");
    const feedback = document.getElementById("feedback");
    const nextButton = document.getElementById("nextButton");
    const restartButton = document.getElementById("restartButton");
    const result = document.getElementById("result");
    const quiz = document.getElementById("quiz");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const review = document.getElementById("review");
    const playAgainButton = document.getElementById("playAgainButton");

    function renderQuestion() {
      const question = questions[current];
      answered = false;

      questionCounter.textContent = `${question.title} de ${questions.length}`;
      progressBar.style.width = `${(current / questions.length) * 100}%`;
      scoreLabel.textContent = `${score} ${score === 1 ? "certa" : "certas"}`;
      scenarioNumber.textContent = question.title;
      scenarioImage.src = question.image;
      scenarioImage.alt = question.imageAlt;
      scenarioText.textContent = question.scenario;
      feedback.className = "feedback";
      feedback.innerHTML = "";
      nextButton.classList.add("hidden");

      answers.innerHTML = "";
      options.forEach((option) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.textContent = option;
        button.addEventListener("click", () => chooseAnswer(option, button));
        answers.appendChild(button);
      });
    }

    function chooseAnswer(option, button) {
      if (answered) return;

      const question = questions[current];
      const isCorrect = option === question.answer;
      answered = true;
      answersGiven[current] = { selected: option, correct: isCorrect };

      if (isCorrect) {
        score += 1;
        button.classList.add("correct");
      } else {
        button.classList.add("wrong");
      }

      Array.from(answers.children).forEach((answerButton) => {
        answerButton.disabled = true;
        if (answerButton.textContent === question.answer) {
          answerButton.classList.add("correct");
        }
      });

      feedback.className = `feedback show ${isCorrect ? "correct" : "wrong"}`;
      feedback.innerHTML = `
        <strong>${isCorrect ? "Correto." : "A resposta mais adequada é: " + question.answer + "."}</strong>
        <span>${question.feedback}</span>
      `;

      scoreLabel.textContent = `${score} ${score === 1 ? "certa" : "certas"}`;
      nextButton.textContent = current === questions.length - 1 ? "Ver resultado" : "Seguinte";
      nextButton.classList.remove("hidden");
      progressBar.style.width = `${((current + 1) / questions.length) * 100}%`;
    }

    function next() {
      if (!answered) return;
      if (current < questions.length - 1) {
        current += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quiz.classList.add("hidden");
      result.classList.remove("hidden");
      finalScore.textContent = score;
      finalMessage.textContent = score === questions.length
        ? "Excelente. Reconheceu todas as situações que exigem autorização ou procedimento formal equivalente."
        : "Reveja as situações assinaladas. O essencial é confirmar sempre o risco real, o procedimento interno e as condições concretas da tarefa.";

      review.innerHTML = "";
      questions.forEach((question, index) => {
        const item = document.createElement("div");
        item.className = "review-item";
        const state = answersGiven[index]?.correct ? "Certo" : "A rever";
        item.innerHTML = `
          <strong>${question.title} - ${state}</strong>
          <span>Resposta esperada: ${question.answer}.</span>
        `;
        review.appendChild(item);
      });
    }

    function restart() {
      current = 0;
      score = 0;
      answered = false;
      answersGiven.length = 0;
      result.classList.add("hidden");
      quiz.classList.remove("hidden");
      renderQuestion();
    }

    nextButton.addEventListener("click", next);
    restartButton.addEventListener("click", restart);
    playAgainButton.addEventListener("click", restart);

    renderQuestion();
  </script>
</body>
</html>
